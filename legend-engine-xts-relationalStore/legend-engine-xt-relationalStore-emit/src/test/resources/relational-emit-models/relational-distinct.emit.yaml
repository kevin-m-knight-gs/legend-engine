name: relational-distinct
title: "Relational Mapping with a DISTINCT Projection"
description: |
  The Person class from `relational-shared-domain` is mapped onto a table that
  carries one row per person *per role*, so the same person appears more than
  once. The class mapping declares `~distinct`, which pushes a DISTINCT onto
  the generated projection. Proves that `~distinct` at class-mapping level
  collapses the duplicate source rows into one instance per person.

modelSources:
  model:
    root: relational-distinct
    files:
      - store/db.pure
      - data/testData.pure
      - mapping/personMapping.pure
  dependencies:
    - source: relational-shared-domain.emit.yaml

features:
  - execution:data-element
  - execution:test-data
  - mapping:relational-distinct
  - scaffolding:class
  - scaffolding:relational-mapping
  - scaffolding:relational-store
stores:
  - relational
complexity: basic
tags:
  - distinct
  - h2
  - mapping-test
  - shared-domain
