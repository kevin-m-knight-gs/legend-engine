name: relational-inline-embedded
title: "Inline Embedded Relational Mapping"
description: |
  An Employee's complex `address` property is satisfied by pointing at a
  separately-declared Address class mapping with the `address () Inline
  [addressAlias]` syntax, instead of restating the column bindings in an
  embedded block. Proves that a named set implementation can be reused as the
  body of an embedded property mapping — the distinction from
  `relational-embedded`, where the same shape is spelled out inline.

modelSources:
  model:
    root: relational-inline-embedded
    files:
      - model/types.pure
      - store/db.pure
      - data/testData.pure
      - mapping/employeeMapping.pure

features:
  - execution:data-element
  - execution:test-data
  - mapping:relational-inline-embedded
  - scaffolding:class
  - scaffolding:relational-mapping
  - scaffolding:relational-store
stores:
  - relational
complexity: basic
tags:
  - denormalized
  - h2
  - inline-embedded
  - mapping-test
