name: relational-otherwise-embedded
title: "Otherwise-Embedded Relational Mapping"
description: |
  An Employee's `firm` property carries an embedded mapping covering only
  `legalName` from a denormalized column, plus an `Otherwise ( [firmSet]:
  [db]@EmployeeFirmJoin )` fallback pointing at a full Firm set implementation.
  Two test suites prove both arms of the choice: a query needing only
  `firm.legalName` is answered from the denormalized column, while a query
  needing `firm.otherInformation` — absent from the embedded block — falls back
  through the join to the standalone Firm mapping.

modelSources:
  model:
