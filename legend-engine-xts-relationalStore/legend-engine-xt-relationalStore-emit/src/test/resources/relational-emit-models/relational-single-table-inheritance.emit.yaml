name: relational-single-table-inheritance
title: "Single-Table Inheritance with Discriminator Filters"
description: |
  A Shape hierarchy (Circle, Square) is stored in one wide table carrying a
  `kind` discriminator column. Each subclass gets its own set implementation on
  that same table, distinguished by a store-level `~filter`, and the abstract
  root is mapped with an `Operation` element using the `inheritance` router
  operation. Proves the single-table strategy: querying the root class
  dispatches to every mapped leaf subtype and unions their filtered rows.

