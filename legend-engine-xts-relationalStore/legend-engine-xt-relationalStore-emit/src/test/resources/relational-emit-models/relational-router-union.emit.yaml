name: relational-router-union
title: "Router Union Over Two Set Implementations"
description: |
  A Product class backed by two relational set implementations combined with
  the `special_union` router operation, the counterpart to the plain `union`
  used by `relational-store-union`. Where `union` is pushed down as a single
  store query, `special_union` is resolved by the router, which executes each
  set implementation in its own right and concatenates the results. Proves that
  routing path for a relational model.

