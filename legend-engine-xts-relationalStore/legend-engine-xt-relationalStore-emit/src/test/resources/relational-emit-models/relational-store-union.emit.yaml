name: relational-store-union
title: "Store Union Across Two Tables"
description: |
  A single Customer class has two relational set implementations — one per
  regional table — combined by an `Operation` element invoking the `union`
  router operation over both set ids. Proves that one logical class can be
  backed by several tables in the same store and that a query over the class
  returns the union of their rows, with the union pushed down to the store.

